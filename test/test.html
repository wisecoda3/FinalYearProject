<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Platform</title>
  <link rel="stylesheet" href="test.css" />
  <script type="module" src="test.js"defer></script>
</head>
<body>
  <header>
    <h1>Donation Platform</h1>
    <p>Help those in need by posting or supporting donation requests.</p>
  </header>
  <section id="auth-section">
    <h2>Sign In / Sign Up</h2>
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button  id="signin1">Sign Up</button>
    <button onclick="signIn()">Sign In</button>
    <button onclick="signOut()" id="signOutBtn" style="display:none;">Sign Out</button>
    <p id="auth-status"></p>
  </section>
  <main>
    <!-- Donation Request Form -->
    <section id="donation-request">
      <h2>Request a Donation</h2>
      <form id="requestForm">
        <input type="text" id="requesterName" placeholder="Your Name"  />
        <input type="text" id="requestReason" placeholder="Reason for Request"  />
        <input type="number" id="requestAmount" placeholder="Amount Needed ($)"  />
        <button type="submit" id="submit">Submit Request</button>
      </form>
    </section>

    <!-- Display Donation Requests -->
    <section id="requests">
      <h2>Current Donation Requests</h2>
      <ul id="requestList"></ul>
    </section>
  </main>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-database.js"></script>
  
  <!-- Your JavaScript file -->
  
</body>
</html>
