<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Platform</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f3e4;
            text-align: center;
        }

        header {
            background: #1e2841;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            background: none;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        button {
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        /* Forms */
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 50%;
            margin: auto;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Footer */
        footer {
            background: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Donation Platform</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#donate">Donate</a></li>
                <li><a href="#requests">Requests</a></li>
                <li><a href="#login">Login</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="home">
        <h2>Helping those in need, one donation at a time.</h2>
        <img src="/assets/chilgimg.png" alt="">
    </section>
    
    <section id="donate">
        <h2>Make a Donation</h2>
        <form id="donationForm">
            <input type="text" id="donorName" placeholder="Your Name" required>
            <input type="number" id="donationAmount" placeholder="Amount ($)" required>
            <button type="submit">Donate</button>
        </form>
        <div id="donationList"></div>
    </section>
    
    <section id="requests">
        <h2>Donation Requests</h2>
        <ul id="requestList"></ul>
    </section>
    
    <section id="login">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="userStatus">Not logged in</p>
        <button id="logoutBtn" style="display:none;">Logout</button>

        <button id="notlogoutBtn" >Bs</button>
    </section>
    
    <footer>
        <p>&copy; 2025 Donation Platform. All rights reserved.</p>
    </footer>
</body>
<script>
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-analytics.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
</script>
<script type="module" defer src="app.js"></script>
</html>
